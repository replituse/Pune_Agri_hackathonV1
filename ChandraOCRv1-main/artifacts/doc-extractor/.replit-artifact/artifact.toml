kind = "web"
previewPath = "/"
title = "Document Extractor"
version = "1.0.0"
id = "artifacts/doc-extractor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21926

[services.development]
run = "pnpm --filter @workspace/doc-extractor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/doc-extractor", "run", "build" ]
publicDir = "artifacts/doc-extractor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21926"
BASE_PATH = "/"
